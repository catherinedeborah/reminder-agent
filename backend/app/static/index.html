<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reminder Agent Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- React and Babel via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Premium CSS System (Vanilla) */
        :root {
            --bg-color: #0f1319;
            --panel-bg: rgba(22, 28, 36, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #8a5cf5;
            --primary-glow: rgba(138, 92, 245, 0.25);
            --secondary: #00ffd5;
            --secondary-glow: rgba(0, 255, 213, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --font-main: 'Outfit', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(138, 92, 245, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 255, 213, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: var(--transition);
        }

        .glass-card:hover {
            border-color: rgba(138, 92, 245, 0.25);
            box-shadow: 0 12px 40px 0 rgba(138, 92, 245, 0.15);
        }

        /* Utility Styles */
        h1, h2, h3, h4 {
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Login Layout */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 19, 25, 0.8);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: var(--font-main);
            outline: none;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: var(--font-main);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 92, 245, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--text-muted);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .error-message {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        /* Dashboard Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        .header-title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-title-section .brand-logo-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        .reminder-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 280px;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .card-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-sprint { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-hygiene { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-kpi { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-other { background: rgba(107, 114, 128, 0.2); color: #d1d5db; }

        .card-body {
            margin-bottom: 1.5rem;
        }

        .card-meta-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .card-channels {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .channel-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--panel-border);
            padding-top: 1rem;
            margin-top: auto;
        }

        .action-icons {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            color: var(--primary);
        }
        
        .icon-btn-danger:hover {
            color: var(--danger);
        }

        /* Switch Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--panel-border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Form Modal Layout */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            animation: slideUp 0.4s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 1rem;
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .col-full {
            grid-column: 1 / -1;
        }

        .modal-footer {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            border-top: 1px solid var(--panel-border);
            padding-top: 1.5rem;
        }

        /* Form components styling */
        .checkbox-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* Console Preview Modal styles */
        .console-modal {
            max-width: 900px;
        }

        .console-logs {
            background: #06080b;
            border: 1px solid #1a202c;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Space Grotesk', monospace;
            font-size: 0.85rem;
            max-height: 250px;
            overflow-y: auto;
            color: #34d399;
            margin-bottom: 1.5rem;
        }

        .message-preview-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .preview-box {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 1.25rem;
            font-family: inherit;
        }

        .preview-box-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-bottom: 1px solid #1f2937;
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .preview-content {
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Responsive Form grid */
        @media (max-width: 768px) {
            .modal-body {
                grid-template-columns: 1fr;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React App Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Lucide Icon Wrapper Component
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = "";
                    const iconNode = lucide.createIcons({
                        attrs: {
                            class: className,
                            width: size,
                            height: size
                        },
                        icons: {
                            [name]: lucide[name]
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} style={{ display: 'inline-flex', alignItems: 'center' }} />;
        };

        const App = () => {
            const [token, setToken] = useState(localStorage.getItem("token") || "");
            const [username, setUsername] = useState("admin");
            const [reminders, setReminders] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [currentConfig, setCurrentConfig] = useState(null);
            const [showPreviewModal, setShowPreviewModal] = useState(false);
            const [previewLogs, setPreviewLogs] = useState([]);
            const [previewMessages, setPreviewMessages] = useState({});
            const [errorMsg, setErrorMsg] = useState("");

            const apiBase = ""; // Empty string because we serve directly from backend

            const headers = {
                "Content-Type": "application/json",
                ...(token ? { "Authorization": `Bearer ${token}` } : {})
            };

            useEffect(() => {
                if (token) {
                    fetchReminders();
                }
            }, [token]);

            const fetchReminders = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${apiBase}/reminders`, { headers });
                    if (response.status === 401) {
                        handleLogout();
                        return;
                    }
                    const data = await response.json();
                    setReminders(data);
                } catch (err) {
                    console.error("Error fetching configurations:", err);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = async (user, pass) => {
                setErrorMsg("");
                try {
                    const response = await fetch(`${apiBase}/api/auth/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username: user, password: pass })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        localStorage.setItem("token", data.access_token);
                        setToken(data.access_token);
                        setUsername(user);
                    } else {
                        setErrorMsg(data.detail || "Authentication failed");
                    }
                } catch (err) {
                    setErrorMsg("Connection error to backend");
                }
            };

            const handleLogout = () => {
                localStorage.removeItem("token");
                setToken("");
                setReminders([]);
            };

            const toggleEnabled = async (id, currentVal) => {
                try {
                    const response = await fetch(`${apiBase}/reminders/${id}`, {
                        method: "PUT",
                        headers,
                        body: JSON.stringify({ enabled: !currentVal })
                    });
                    if (response.ok) {
                        setReminders(reminders.map(r => r.id === id ? { ...r, enabled: !currentVal } : r));
                    }
                } catch (err) {
                    console.error("Toggle enabled failed:", err);
                }
            };

            const handleDelete = async (id) => {
                if (!confirm("Are you sure you want to delete this config?")) return;
                try {
                    const response = await fetch(`${apiBase}/reminders/${id}`, {
                        method: "DELETE",
                        headers
                    });
                    if (response.ok) {
                        setReminders(reminders.filter(r => r.id !== id));
                    }
                } catch (err) {
                    console.error("Deletion failed:", err);
                }
            };

            const handleSaveConfig = async (formData) => {
                try {
                    const method = formData.id ? "PUT" : "POST";
                    const url = formData.id ? `${apiBase}/reminders/${formData.id}` : `${apiBase}/reminders`;
                    
                    const response = await fetch(url, {
                        method,
                        headers,
                        body: JSON.stringify(formData)
                    });

                    if (response.ok) {
                        setShowModal(false);
                        fetchReminders();
                    } else {
                        const errData = await response.json();
                        alert(`Failed to save config: ${JSON.stringify(errData.detail)}`);
                    }
                } catch (err) {
                    console.error("Failed saving configuration:", err);
                }
            };

            const triggerManually = async (id) => {
                setLoading(true);
                try {
                    const response = await fetch(`${apiBase}/reminders/${id}/trigger`, {
                        method: "POST",
                        headers
                    });
                    const data = await response.json();
                    setPreviewLogs(data.logs || []);
                    setPreviewMessages(data.consolidated_messages || {});
                    setShowPreviewModal(true);
                } catch (err) {
                    console.error("Manual trigger failed:", err);
                    alert("Manual trigger execution failed.");
                } finally {
                    setLoading(false);
                }
            };

            const triggerBatch = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${apiBase}/reminders/trigger-batch`, {
                        method: "POST",
                        headers
                    });
                    const data = await response.json();
                    setPreviewLogs(data.logs || []);
                    setPreviewMessages(data.consolidated_messages || {});
                    setShowPreviewModal(true);
                } catch (err) {
                    console.error("Batch trigger failed:", err);
                    alert("Batch trigger execution failed.");
                } finally {
                    setLoading(false);
                }
            };

            const openCreateModal = () => {
                setCurrentConfig({
                    name: "",
                    type: "SUBTASK_CREATION_REMINDER",
                    category: "hygiene",
                    schedule: "0 9 * * 1-5",
                    enabled: true,
                    recipients: { users: ["alice", "bob", "arunj"], groups: ["dev-team"] },
                    channels: ["slack"],
                    template_string: `Hi {{ assignee }},\n\nHere’s your consolidated sprint update:\n\n🔴 Tasks Missing Subtasks:\n{% for item in missing_subtasks -%}\n- {{ make_link(item.system, item.issue_key) }} : {{ item.summary }}\n{% else -%}\n- None\n{% endfor %}\n🟡 Tasks Without Recent Updates:\n{% for item in stale_status -%}\n- {{ make_link(item.system, item.issue_key) }} : {{ item.summary }}\n{% else -%}\n- None\n{% endfor %}\n🔵 Mid Sprint Attention Needed:\n{% for item in mid_progress_issues -%}\n- {{ make_link(item.system, item.issue_key) }} : {{ item.summary }}\n{% else -%}\n- None\n{% endfor %}\n⚪ Tasks Not Created:\n{% for item in missing_tasks -%}\n- {{ make_link(item.system, item.issue_key) }} : {{ item.summary }}\n{% else -%}\n- None\n{% endfor %}\nSummary:\n- Total Issues: {{ total_issues }}\n- Action Required: {{ action_required }}\n\nPlease take action.`,
                    tool_hints: ["JiraTool"],
                    data_requirements: {},
                    aggregation: { group_by: ["assignee"], combine_alerts: true },
                    execution: { allow_multi_tool: true, allow_multi_query: true },
                    metadata_json: { project_keys: ["ABC", "XYZ", "DEF"] },
                    retry_policy: {},
                    notification_rules: {}
                });
                setShowModal(true);
            };

            const openEditModal = (config) => {
                setCurrentConfig(config);
                setShowModal(true);
            };

            if (!token) {
                return <Login onLogin={handleLogin} errorMsg={errorMsg} />;
            }

            return (
                <div className="container">
                    <div className="dashboard-header">
                        <div className="header-title-section">
                            <div className="brand-logo-small">
                                <Icon name="Bell" size={24} className="text-white" />
                            </div>
                            <div>
                                <h1>Reminder Agent Control Panel</h1>
                                <p style={{ color: "var(--text-muted)", fontSize: "0.875rem" }}>
                                    Configure and orchestrate LLM-driven alert consolidation
                                </p>
                            </div>
                        </div>
                        <div className="user-status">
                            <span className="channel-pill">
                                <Icon name="User" size={14} /> {username}
                            </span>
                            <button className="btn btn-secondary" onClick={openCreateModal}>
                                <Icon name="Plus" size={16} /> New Alert Config
                            </button>
                            <button className="btn btn-primary" onClick={triggerBatch} disabled={loading}>
                                <Icon name="Play" size={16} /> Run Consolidated Batch
                            </button>
                            <button className="btn btn-secondary" onClick={handleLogout}>
                                <Icon name="LogOut" size={16} /> Log Out
                            </button>
                        </div>
                    </div>

                    {loading && <p style={{ color: 'var(--secondary)', marginBottom: '1rem' }}>Processing Agent execution tasks...</p>}

                    <div className="cards-grid">
                        {reminders.map(config => (
                            <div key={config.id} className="glass-card reminder-card">
                                <div>
                                    <div className="card-header">
                                        <div>
                                            <h3 className="card-title">{config.name}</h3>
                                            <span className={`card-badge badge-${config.category || 'other'}`}>
                                                {config.category || 'other'}
                                            </span>
                                        </div>
                                        <label className="switch">
                                            <input 
                                                type="checkbox" 
                                                checked={config.enabled} 
                                                onChange={() => toggleEnabled(config.id, config.enabled)} 
                                            />
                                            <span className="slider"></span>
                                        </label>
                                    </div>
                                    <div className="card-body">
                                        <div className="card-meta-row">
                                            <Icon name="Cpu" size={14} />
                                            <span>Type: <code>{config.type}</code></span>
                                        </div>
                                        <div className="card-meta-row">
                                            <Icon name="Calendar" size={14} />
                                            <span>Cron: <code>{config.schedule}</code></span>
                                        </div>
                                        <div className="card-meta-row">
                                            <Icon name="Eye" size={14} />
                                            <span>Consolidated Mode: <strong>{config.aggregation?.combine_alerts ? 'ON' : 'OFF'}</strong></span>
                                        </div>
                                        <div className="card-channels">
                                            {config.channels?.map(ch => (
                                                <span key={ch} className="channel-pill">
                                                    <Icon name={ch === "slack" ? "MessageSquare" : ch === "email" ? "Mail" : "Smartphone"} size={12} />
                                                    {ch}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="card-actions">
                                    <button className="btn btn-secondary btn-sm" onClick={() => triggerManually(config.id)} disabled={loading}>
                                        <Icon name="Zap" size={14} /> Trigger Agent
                                    </button>
                                    <div className="action-icons">
                                        <button className="icon-btn" onClick={() => openEditModal(config)}>
                                            <Icon name="Edit3" size={18} />
                                        </button>
                                        <button className="icon-btn icon-btn-danger" onClick={() => handleDelete(config.id)}>
                                            <Icon name="Trash2" size={18} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <ReminderForm 
                            config={currentConfig} 
                            onClose={() => setShowModal(false)} 
                            onSave={handleSaveConfig} 
                        />
                    )}

                    {showPreviewModal && (
                        <PreviewModal 
                            logs={previewLogs} 
                            messages={previewMessages} 
                            onClose={() => setShowPreviewModal(false)} 
                        />
                    )}
                </div>
            );
        };

        const Login = ({ onLogin, errorMsg }) => {
            const [user, setUser] = useState("admin");
            const [pass, setPass] = useState("admin123");

            const handleSubmit = (e) => {
                e.preventDefault();
                onLogin(user, pass);
            };

            return (
                <div className="login-container">
                    <div className="glass-card login-card">
                        <div className="brand-logo">
                            <Icon name="Cpu" size={36} className="text-white" />
                        </div>
                        <h2 style={{ marginBottom: '0.5rem', fontSize: '2rem' }}>Reminder Agent</h2>
                        <p style={{ color: 'var(--text-muted)', marginBottom: '2rem' }}>Authenticate to manage configuration db</p>
                        
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="form-label">Username</label>
                                <input 
                                    type="text" 
                                    className="form-input" 
                                    value={user} 
                                    onChange={(e) => setUser(e.target.value)} 
                                    required 
                                />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Password</label>
                                <input 
                                    type="password" 
                                    className="form-input" 
                                    value={pass} 
                                    onChange={(e) => setPass(e.target.value)} 
                                    required 
                                />
                            </div>
                            <button type="submit" className="btn btn-primary" style={{ width: '100%', marginTop: '1rem' }}>
                                Sign In
                            </button>
                        </form>
                        {errorMsg && (
                            <div className="error-message">
                                <Icon name="AlertCircle" size={16} />
                                <span>{errorMsg}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ReminderForm = ({ config, onClose, onSave }) => {
            const [formData, setFormData] = useState({ ...config });

            const handleChange = (name, value) => {
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleNestedChange = (parent, name, value) => {
                setFormData(prev => ({
                    ...prev,
                    [parent]: { ...prev[parent], [name]: value }
                }));
            };

            const toggleChannel = (channel) => {
                const current = formData.channels || [];
                const updated = current.includes(channel)
                    ? current.filter(c => c !== channel)
                    : [...current, channel];
                handleChange("channels", updated);
            };

            const toggleToolHint = (tool) => {
                const current = formData.tool_hints || [];
                const updated = current.includes(tool)
                    ? current.filter(t => t !== tool)
                    : [...current, tool];
                handleChange("tool_hints", updated);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            return (
                <div className="modal-overlay">
                    <div className="glass-card modal-content">
                        <div className="modal-header">
                            <h2>{formData.id ? "Edit Reminder Config" : "Create Reminder Config"}</h2>
                            <button className="icon-btn" onClick={onClose}>
                                <Icon name="X" size={24} />
                            </button>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-group col-full">
                                    <label className="form-label">Alert Name</label>
                                    <input 
                                        type="text" 
                                        className="form-input" 
                                        value={formData.name} 
                                        onChange={(e) => handleChange("name", e.target.value)} 
                                        required 
                                    />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Alert Type</label>
                                    <select 
                                        className="form-input" 
                                        value={formData.type} 
                                        onChange={(e) => handleChange("type", e.target.value)}
                                    >
                                        <option value="SPRINT_MID_PROGRESS_CHECK">SPRINT_MID_PROGRESS_CHECK</option>
                                        <option value="TASK_CREATION_REMINDER">TASK_CREATION_REMINDER</option>
                                        <option value="SUBTASK_CREATION_REMINDER">SUBTASK_CREATION_REMINDER</option>
                                        <option value="STATUS_UPDATE_REMINDER">STATUS_UPDATE_REMINDER</option>
                                        <option value="PLM_ASSIGNED_ITEMS">PLM_ASSIGNED_ITEMS</option>
                                        <option value="PLM_TAT_BREACH">PLM_TAT_BREACH</option>
                                        <option value="KPI_COMMITS">KPI_COMMITS</option>
                                        <option value="KPI_CODE_REVIEWS">KPI_CODE_REVIEWS</option>
                                        <option value="TEAM_HEALTH_SUMMARY">TEAM_HEALTH_SUMMARY</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Category</label>
                                    <select 
                                        className="form-input" 
                                        value={formData.category} 
                                        onChange={(e) => handleChange("category", e.target.value)}
                                    >
                                        <option value="sprint">sprint</option>
                                        <option value="hygiene">hygiene</option>
                                        <option value="kpi">kpi</option>
                                        <option value="other">other</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Schedule (Cron)</label>
                                    <input 
                                        type="text" 
                                        className="form-input" 
                                        value={formData.schedule} 
                                        onChange={(e) => handleChange("schedule", e.target.value)} 
                                        required 
                                    />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Project Keys (Comma-separated)</label>
                                    <input 
                                        type="text" 
                                        className="form-input" 
                                        value={formData.metadata_json?.project_keys?.join(", ") || ""} 
                                        onChange={(e) => handleNestedChange("metadata_json", "project_keys", e.target.value.split(",").map(s => s.trim()))} 
                                    />
                                </div>
                                <div className="form-group col-full">
                                    <label className="form-label">Notification Channels</label>
                                    <div className="checkbox-group">
                                        {["slack", "email", "knox"].map(ch => (
                                            <label key={ch} className="checkbox-label">
                                                <input 
                                                    type="checkbox" 
                                                    className="checkbox-input" 
                                                    checked={formData.channels?.includes(ch) || false} 
                                                    onChange={() => toggleChannel(ch)} 
                                                />
                                                <span style={{ textTransform: "capitalize" }}>{ch}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group col-full">
                                    <label className="form-label">Tool Hints (Data Sources)</label>
                                    <div className="checkbox-group">
                                        {["JiraTool", "GitHubTool", "PLMTool", "KPITool"].map(tool => (
                                            <label key={tool} className="checkbox-label">
                                                <input 
                                                    type="checkbox" 
                                                    className="checkbox-input" 
                                                    checked={formData.tool_hints?.includes(tool) || false} 
                                                    onChange={() => toggleToolHint(tool)} 
                                                />
                                                <span>{tool}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group col-full">
                                    <label className="checkbox-label">
                                        <input 
                                            type="checkbox" 
                                            className="checkbox-input" 
                                            checked={formData.aggregation?.combine_alerts || false} 
                                            onChange={(e) => handleNestedChange("aggregation", "combine_alerts", e.target.checked)} 
                                        />
                                        <strong>Enable Alert Consolidation (Single Message per Assignee)</strong>
                                    </label>
                                </div>
                                <div className="form-group col-full">
                                    <label className="form-label">Jinja2 Message Template</label>
                                    <textarea 
                                        rows="10" 
                                        className="form-input" 
                                        style={{ fontFamily: 'monospace', fontSize: '0.85rem' }}
                                        value={formData.template_string} 
                                        onChange={(e) => handleChange("template_string", e.target.value)}
                                        required 
                                    />
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>
                                    Cancel
                                </button>
                                <button type="submit" className="btn btn-primary">
                                    <Icon name="Save" size={16} /> Save Configuration
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const PreviewModal = ({ logs, messages, onClose }) => {
            return (
                <div className="modal-overlay">
                    <div className="glass-card modal-content console-modal">
                        <div className="modal-header">
                            <h2>Agent Execution Console Telemetry</h2>
                            <button className="icon-btn" onClick={onClose}>
                                <Icon name="X" size={24} />
                            </button>
                        </div>
                        <div>
                            <h3 style={{ marginBottom: "0.5rem" }}>Execution Traces</h3>
                            <div className="console-logs">
                                {logs.map((log, index) => (
                                    <div key={index} style={{ marginBottom: "0.25rem" }}>
                                        &gt; {log}
                                    </div>
                                ))}
                            </div>

                            <h3 style={{ marginBottom: "0.5rem" }}>Consolidated Messages Generated</h3>
                            <div className="message-preview-container">
                                {Object.keys(messages).length === 0 ? (
                                    <p style={{ color: "var(--text-muted)" }}>No notifications were dispatched during this run.</p>
                                ) : (
                                    Object.entries(messages).map(([assignee, message]) => (
                                        <div key={assignee} className="preview-box">
                                            <div className="preview-box-header">
                                                <span>Assignee: <strong>{assignee}</strong></span>
                                                <span>Type: Markdown/Plain Text</span>
                                            </div>
                                            <div className="preview-content">{message}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-primary" onClick={onClose}>
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
