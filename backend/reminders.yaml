# Configuration-driven Reminder Agent Settings
# You can define reminder config entries here. The backend automatically imports these on startup,
# and you can run them directly in command-line mode using trigger_yaml.py.

reminders:
  - name: "Active Sprint Board Reminders"
    type: "SPRINT_BOARD_ALERTS"
    category: "sprint"
    schedule: "0 9 * * 1-5"
    enabled: true
    board_id: 123
    sprint_start_enabled: true
    sprint_mid_enabled: true
    sprint_end_enabled: true
    recipients:
      users: ["alice", "bob", "arunj", "charlie", "david"]
      groups: ["dev-team"]
    channels: ["slack", "email"]
    tool_hints: ["JiraTool"]
    metadata_json: {}
    aggregation:
      combine_alerts: true
      group_by: ["assignee"]
    execution:
      allow_multi_tool: true
      allow_multi_query: true

  - name: "PLM Approvals & TAT Breach Check"
    type: "PLM_TAT_BREACH"
    category: "kpi"
    schedule: "0 9 * * 1-5"
    enabled: true
    recipients:
      users: ["alice", "bob", "arunj"]
    channels: ["email"]
    template_string: "plm_tat_breach" # Will load plm_tat_breach.jinja2 from disk
    tool_hints: ["PLMTool"]
    metadata_json: {}
    aggregation:
      combine_alerts: true
      group_by: ["assignee"]
    execution:
      allow_multi_tool: true
      allow_multi_query: true
